<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="ball-clip">
      <circle cx="200" cy="190" r="178"/>
    </clipPath>
  </defs>

  <!-- 외곽 링 -->
  <circle cx="200" cy="190" r="196" fill="#4060F8"/>
  <circle cx="200" cy="190" r="188" fill="#2040E0"/>
  <circle cx="200" cy="190" r="178" fill="#0407C7"/>

  <!-- 수학적으로 계산된 축구공 패치 — 패치 크기 키우고 서로 맞닿게 -->
  <g clip-path="url(#ball-clip)" stroke="#2535D8" stroke-width="2" fill="#01047A" stroke-linejoin="round">

    <!-- 중앙 오각형 -->
    <polygon points="200,152 246,185 228,237 172,237 154,185"/>

    <!-- 육각형 1 (상단) -->
    <polygon points="200,152 246,185 268,134 238,88 162,88 132,134 154,185"/>

    <!-- 육각형 2 (우상) -->
    <polygon points="246,185 228,237 278,268 332,240 340,182 298,150"/>

    <!-- 육각형 3 (하단) -->
    <polygon points="228,237 172,237 152,288 190,320 248,308 278,268"/>

    <!-- 육각형 4 (좌하) -->
    <polygon points="172,237 154,185 102,150 60,182 68,240 122,268"/>

    <!-- 육각형 5 (좌상) -->
    <polygon points="154,185 200,152 132,134 102,150 60,182 68,140 102,94 162,88 132,134"/>

    <!-- 외곽 오각형 1 (최상단) -->
    <polygon points="200,18 244,50 238,88 162,88 156,50"/>

    <!-- 외곽 오각형 2 (우상) -->
    <polygon points="354,118 368,166 340,182 298,150 304,104"/>

    <!-- 외곽 오각형 3 (우하) -->
    <polygon points="340,278 310,318 248,308 278,268 332,240"/>

    <!-- 외곽 오각형 4 (좌하) -->
    <polygon points="60,278 68,240 122,268 152,308 90,318"/>

    <!-- 외곽 오각형 5 (좌상) -->
    <polygon points="46,118 96,104 102,150 60,182 32,166"/>

  </g>

  <!-- 원 테두리 -->
  <circle cx="200" cy="190" r="178" fill="none" stroke="#3050F0" stroke-width="4"/>

  <!-- P 이니셜 — 세련된 굵기 -->
  <text
    x="200"
    y="192"
    font-family="Arial, Helvetica, sans-serif"
    font-size="155"
    font-weight="300"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="central"
  >P</text>

  <!-- Ploky -->
  <text
    x="200"
    y="418"
    font-family="Arial Black, sans-serif"
    font-size="56"
    font-weight="900"
    fill="#0D1260"
    text-anchor="middle"
  >Ploky</text>

  <!-- FOOTBALL -->
  <text
    x="200"
    y="460"
    font-family="Arial, sans-serif"
    font-size="18"
    font-weight="400"
    fill="#333333"
    text-anchor="middle"
    letter-spacing="5"
  >FOOTBALL</text>
</svg>
