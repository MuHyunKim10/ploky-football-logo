<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="ball-clip">
      <circle cx="200" cy="195" r="173"/>
    </clipPath>
  </defs>

  <!-- 외곽 링 -->
  <circle cx="200" cy="195" r="192" fill="#3050F0"/>
  <circle cx="200" cy="195" r="184" fill="#1828D8"/>
  <circle cx="200" cy="195" r="175" fill="#0407C7"/>

  <!--
    실제 축구공 구조:
    중앙 오각형 1개, 주변 육각형 5개, 외곽 오각형 5개가
    방사형으로 배열됨. cx=200, cy=195 기준.
    오각형 한 변 길이 ≈ 52px 기준으로 계산.
  -->
  <g clip-path="url(#ball-clip)" stroke="#1535CC" stroke-width="2.8" fill="#02059a" stroke-linejoin="round">

    <!-- ① 중앙 오각형 (정오각형, 위쪽 꼭짓점 기준 72도 간격) -->
    <polygon points="
      200,133
      249,167
      231,222
      169,222
      151,167
    "/>

    <!-- ② 상단 육각형 (중앙 오각형 위 변에 붙음) -->
    <polygon points="
      200,133
      249,167
      269,120
      238,78
      162,78
      131,120
      151,167
    "/>

    <!-- ③ 우상단 육각형 (중앙 오각형 우상 변) -->
    <polygon points="
      249,167
      231,222
      276,248
      326,224
      338,170
      298,138
    "/>

    <!-- ④ 우하단 육각형 (중앙 오각형 우하 변) -->
    <polygon points="
      231,222
      169,222
      155,275
      196,308
      245,296
      276,248
    "/>

    <!-- ⑤ 좌하단 육각형 (중앙 오각형 좌하 변) -->
    <polygon points="
      169,222
      151,167
      102,170
      88,224
      124,264
      155,275
    "/>

    <!-- ⑥ 좌상단 육각형 (중앙 오각형 좌상 변) -->
    <polygon points="
      151,167
      200,133
      131,120
      88,138
      88,170
      102,170
    "/>

    <!-- ⑦ 상단 오각형 (② 위쪽) -->
    <polygon points="
      200,133
      238,78
      200,48
      162,78
    "/>

    <!-- ⑧ 우상 오각형 (③ 바깥) -->
    <polygon points="
      249,167
      298,138
      338,170
      326,224
      276,248
    "/>

    <!-- ⑨ 우하 오각형 (④ 바깥) -->
    <polygon points="
      231,222
      276,248
      268,302
      220,325
      196,308
    "/>

    <!-- ⑩ 하단 오각형 (⑤ 바깥) -->
    <polygon points="
      169,222
      155,275
      196,308
      220,325
      168,322
      124,298
      124,264
    "/>

    <!-- ⑪ 좌하 오각형 -->
    <polygon points="
      151,167
      102,170
      62,205
      88,224
    "/>

    <!-- 외곽 보조 패치들 (원 테두리 근처 채우기) -->
    <!-- 상단 좌우 -->
    <polygon points="162,78 131,120 88,138 70,95 110,55 162,48"/>
    <polygon points="238,78 269,120 312,138 330,95 290,55 238,48"/>
    <!-- 좌측 -->
    <polygon points="88,138 62,155 35,195 55,235 88,224 102,170"/>
    <!-- 우측 -->
    <polygon points="312,138 338,155 365,195 345,235 312,224 298,170"/>
    <!-- 좌하 -->
    <polygon points="88,224 55,235 62,275 100,300 124,264"/>
    <!-- 우하 -->
    <polygon points="338,224 365,235 358,275 320,300 296,264 326,224"/>
    <!-- 하단 -->
    <polygon points="124,298 100,320 130,355 170,358 196,330 168,322"/>
    <polygon points="268,302 300,320 270,355 230,358 204,330 220,325"/>

  </g>

  <!-- 원 테두리 재강조 -->
  <circle cx="200" cy="195" r="175" fill="none" stroke="#1535E8" stroke-width="5"/>

  <!-- P 이니셜 (확정, 수정 안 함) -->
  <text
    x="200"
    y="196"
    font-family="Arial, Helvetica, sans-serif"
    font-size="148"
    font-weight="400"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="central"
  >P</text>

  <!-- Ploky (확정) -->
  <text
    x="200"
    y="452"
    font-family="Arial Black, sans-serif"
    font-size="58"
    font-weight="900"
    fill="#0D1260"
    text-anchor="middle"
  >Ploky</text>

  <!-- FOOTBALL (확정) -->
  <text
    x="200"
    y="498"
    font-family="Arial, sans-serif"
    font-size="19"
    font-weight="500"
    fill="#1a1a1a"
    text-anchor="middle"
    letter-spacing="6"
  >FOOTBALL</text>
</svg>
